services:
  - type: web
    name: mealnexus-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Set these manually in the Render dashboard (do not commit values):
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FAST2SMS_API_KEY
        sync: false
      - key: USE_REAL_SMS
        value: "true"
      # Optional — omit to disable AWS integrations (SMS fallback, SQS, S3)
      # - key: AWS_REGION
      #   value: us-east-1
      # - key: AWS_ACCESS_KEY_ID
      #   sync: false
      # - key: AWS_SECRET_ACCESS_KEY
      #   sync: false
      # - key: S3_BUCKET_NAME
      #   sync: false
      # - key: SQS_QUEUE_URL
      #   sync: false
